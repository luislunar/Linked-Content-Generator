<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Big Stat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #0b1f3a;
      color: #f5f1ea;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 1080px;
      height: 1080px;
      padding: 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .section-label {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #1a6fff;
    }
    .index {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245, 241, 234, 0.5);
    }

    .stat-block {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .label-above {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: rgba(245, 241, 234, 0.7);
    }

    .big-number {
      font-size: 360px;
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -0.05em;
      color: #f5f1ea;
    }
    .big-number .accent {
      color: #1a6fff;
    }

    .context {
      font-size: 30px;
      font-weight: 500;
      line-height: 1.3;
      color: rgba(245, 241, 234, 0.9);
      max-width: 880px;
      margin-top: 24px;
    }
    .context strong {
      font-weight: 700;
      color: #f5f1ea;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 24px;
      border-top: 1px solid rgba(245, 241, 234, 0.15);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(245, 241, 234, 0.5);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="section-label">Federal Market</div>
      <div class="index">Snapshot · FY2024</div>
    </div>

    <div class="stat-block">
      <div class="label-above">Total federal contract spend, FY2024</div>
      <div class="big-number">$<span class="accent">685B</span></div>
      <div class="context">
        Small businesses captured <strong>28% of it</strong> — the rest went to primes who don't actually want it.
      </div>
    </div>

    <div class="footer">
      <span>Source · USAspending.gov</span>
      <span>By the Numbers</span>
    </div>
  </div>
</body>
</html>
