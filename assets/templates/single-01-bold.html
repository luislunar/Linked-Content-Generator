<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bold Statement</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Inter', -apple-system, "Helvetica Neue", sans-serif; background: #0b1f3a; color: #f5f1ea; -webkit-font-smoothing: antialiased; }
    .card { width: 1080px; height: 1080px; padding: 90px 90px 80px 90px; display: flex; flex-direction: column; justify-content: space-between; }
    .tag { display: inline-block; padding: 10px 18px; background: #ef4444; color: #fff; font-size: 18px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; width: fit-content; }
    .headline { font-size: 148px; font-weight: 900; line-height: 0.94; letter-spacing: -0.04em; margin-top: 80px; }
    .headline .accent { color: #ef4444; }
    .footer { display: flex; flex-direction: column; gap: 24px; }
    .rule { width: 100%; height: 1px; background: rgba(245, 241, 234, 0.2); }
    .footer-row { display: flex; justify-content: space-between; align-items: flex-end; }
    .sub { font-size: 26px; font-weight: 400; line-height: 1.3; max-width: 720px; color: rgba(245, 241, 234, 0.85); }
    .read { font-size: 16px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(245, 241, 234, 0.6); }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">{{TAG}}</div>
    <div class="headline">{{HEADLINE_HTML}}</div>
    <div class="footer">
      <div class="rule"></div>
      <div class="footer-row">
        <div class="sub">{{SUB}}</div>
        <div class="read">{{ISSUE}}</div>
      </div>
    </div>
  </div>
</body>
</html>
