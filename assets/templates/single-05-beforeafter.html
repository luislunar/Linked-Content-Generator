<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Before / After</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Inter', -apple-system, "Helvetica Neue", sans-serif; background: #f5f1ea; color: #0b1f3a; -webkit-font-smoothing: antialiased; }
    .card { width: 1080px; height: 1080px; display: flex; flex-direction: column; }
    .header { padding: 70px 80px 50px 80px; display: flex; justify-content: space-between; align-items: flex-start; }
    .section-label { font-size: 16px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: #1a6fff; }
    .index { font-size: 14px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(11, 31, 58, 0.5); }
    .headline { padding: 0 80px 50px 80px; font-size: 64px; font-weight: 900; line-height: 0.98; letter-spacing: -0.03em; max-width: 900px; }
    .headline .accent { color: #1a6fff; }
    .split { flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 0; position: relative; }
    .side { padding: 70px 60px; display: flex; flex-direction: column; gap: 30px; }
    .before { background: rgba(239, 68, 68, 0.08); }
    .after { background: #0b1f3a; color: #f5f1ea; }
    .side-label { font-size: 18px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; }
    .before .side-label { color: #ef4444; }
    .after .side-label { color: #1a6fff; }
    .side-list { display: flex; flex-direction: column; gap: 24px; }
    .side-item { font-size: 30px; font-weight: 600; line-height: 1.2; letter-spacing: -0.01em; padding-left: 36px; position: relative; }
    .side-item::before { content: ""; position: absolute; left: 0; top: 14px; width: 22px; height: 4px; background: currentColor; opacity: 0.4; }
    .arrow { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 110px; height: 110px; background: #f5f1ea; border: 4px solid #0b1f3a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 64px; font-weight: 900; color: #0b1f3a; z-index: 2; }
    .footer { padding: 24px 80px; display: flex; justify-content: space-between; align-items: center; background: #f5f1ea; border-top: 1px solid rgba(11, 31, 58, 0.12); font-size: 14px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(11, 31, 58, 0.5); }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="section-label">{{SECTION_LABEL}}</div>
      <div class="index">{{CASE_NUM}}</div>
    </div>
    <div class="headline">{{HEADLINE_HTML}}</div>
    <div class="split">
      <div class="side before">
        <div class="side-label">Before</div>
        <div class="side-list">{{BEFORE_ITEMS_HTML}}</div>
      </div>
      <div class="side after">
        <div class="side-label">After</div>
        <div class="side-list">{{AFTER_ITEMS_HTML}}</div>
      </div>
      <div class="arrow">&rarr;</div>
    </div>
    <div class="footer">
      <span>{{FOOTER_LEFT}}</span>
      <span>{{FOOTER_RIGHT}}</span>
    </div>
  </div>
</body>
</html>
