<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Numbered Breakdown</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Inter', -apple-system, "Helvetica Neue", sans-serif; background: #f5f1ea; color: #0b1f3a; -webkit-font-smoothing: antialiased; }
    .card { width: 1080px; height: 1080px; padding: 80px; display: flex; flex-direction: column; }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 60px; }
    .section-label { font-size: 16px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: #1a6fff; }
    .index { font-size: 14px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(11, 31, 58, 0.5); }
    .headline { font-size: 96px; font-weight: 900; line-height: 0.96; letter-spacing: -0.035em; margin-bottom: 80px; max-width: 920px; }
    .headline .accent { color: #1a6fff; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px 60px; flex-grow: 1; }
    .item { display: flex; flex-direction: column; gap: 16px; padding-top: 30px; border-top: 2px solid #0b1f3a; }
    .item .num { font-size: 64px; font-weight: 900; line-height: 1; letter-spacing: -0.03em; color: #0b1f3a; }
    .item .title { font-size: 32px; font-weight: 700; line-height: 1.1; letter-spacing: -0.01em; }
    .item .desc { font-size: 20px; font-weight: 400; line-height: 1.4; color: rgba(11, 31, 58, 0.7); }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="section-label">{{SECTION_LABEL}}</div>
      <div class="index">{{INDEX}}</div>
    </div>
    <div class="headline">{{HEADLINE_HTML}}</div>
    <div class="grid">{{ITEMS_HTML}}</div>
  </div>
</body>
</html>
