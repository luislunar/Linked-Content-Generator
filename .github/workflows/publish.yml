name: Publish approved draft

on:
  push:
    branches: [main]
    paths:
      - "drafts/**/post.md"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_POSTS_DB_ID: ${{ secrets.NOTION_POSTS_DB_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ZAPIER_WEBHOOK_URL: ${{ secrets.ZAPIER_WEBHOOK_URL }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_REF_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Install deps
        run: |
          pip install requests playwright pillow openai
          npx playwright install --with-deps chromium

      - name: Detect the new draft
        id: draft
        run: |
          DATE=$(git diff --name-only HEAD~1 HEAD | grep -oE 'drafts/[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1 | awk -F/ '{print $2}')
          if [ -z "$DATE" ]; then echo "no draft folder in diff"; exit 0; fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "dir=drafts/$DATE" >> "$GITHUB_OUTPUT"

      - name: Generate post image (gpt-image-2)
        if: steps.draft.outputs.date
        run: |
          python scripts/generate-image-ai.py "${{ steps.draft.outputs.dir }}"

      - name: Commit image to repo
        if: steps.draft.outputs.date
        run: |
          git config user.name "linked-content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add "${{ steps.draft.outputs.dir }}/card.jpg"
          git diff --cached --quiet || git commit -m "publish: ${{ steps.draft.outputs.date }} card"
          git push

      - name: Publish to LinkedIn via Zapier
        if: steps.draft.outputs.date
        run: |
          python scripts/publish-zapier.py "${{ steps.draft.outputs.dir }}"

      - name: Update Notion row
        if: steps.draft.outputs.date
        run: |
          DIR="${{ steps.draft.outputs.dir }}"
          POST_ID=$(python -c "import json; print(json.load(open('$DIR/post.meta.json')).get('notion_post_id',''))")
          if [ -n "$POST_ID" ]; then
            python scripts/notion-sync.py update-published "$POST_ID" "published-via-zapier"
          fi
