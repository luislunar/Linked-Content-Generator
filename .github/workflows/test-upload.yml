name: Test upload all profiles (no post)

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { who: Josh,    token: LINKEDIN_ACCESS_TOKEN,          urn: LINKEDIN_PERSON_URN }
          - { who: William, token: LINKEDIN_ACCESS_TOKEN_WILLIAM,  urn: LINKEDIN_PERSON_URN_WILLIAM }
          - { who: Jason,   token: LINKEDIN_ACCESS_TOKEN_JASON,    urn: LINKEDIN_PERSON_URN_JASON }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests
      - name: Upload test media as ${{ matrix.who }} (no post created)
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets[matrix.token] }}
          LINKEDIN_PERSON_URN: ${{ secrets[matrix.urn] }}
        run: |
          DIR=$(ls -d drafts/*/ | sort | tail -1)
          MEDIA=$(ls "$DIR"card.pdf 2>/dev/null || ls "$DIR"card.jpg)
          echo "Testing ${{ matrix.who }} with $MEDIA"
          python scripts/publish-linkedin.py "$MEDIA" "$DIR" --upload-only
