name: LinkedIn token check

on:
  schedule:
    # Mondays 13:00 UTC — warns (via failure email) when a token is about to expire.
    - cron: "0 13 * * 1"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
      TOKEN_JOSH: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      URN_JOSH: ${{ secrets.LINKEDIN_PERSON_URN }}
    steps:
      - name: Check token expiry
        run: |
          check() {
            local name="$1" token="$2"
            if [ -z "$token" ]; then echo "$name: sin token configurado — omitido"; return 0; fi
            local resp expires now days
            resp=$(curl -s -X POST https://www.linkedin.com/oauth/v2/introspectToken \
              --data-urlencode "client_id=$CLIENT_ID" \
              --data-urlencode "client_secret=$CLIENT_SECRET" \
              --data-urlencode "token=$token")
            expires=$(echo "$resp" | python3 -c "import sys,json; print(json.load(sys.stdin).get('expires_at',0))")
            if [ "$expires" = "0" ]; then
              echo "$name: LinkedIn no devolvió expiración. Respuesta: $resp"
              return 1
            fi
            now=$(date +%s)
            days=$(( (expires - now) / 86400 ))
            echo "$name: $days días restantes | permisos: $(echo "$resp" | python3 -c "import sys,json; print(json.load(sys.stdin).get('scope','?'))")"
            if [ "$days" -lt 10 ]; then
              echo "::error::El token de LinkedIn de $name caduca en $days días. Renovar con: .venv/bin/python scripts/linkedin-token.py"
              return 1
            fi
          }
          check_urn() {
            local name="$1" token="$2" urn="$3"
            if [ -z "$token" ] || [ -z "$urn" ]; then return 0; fi
            local info sub member
            info=$(curl -s -H "Authorization: Bearer $token" https://api.linkedin.com/v2/userinfo)
            sub=$(echo "$info" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sub',''))")
            member=$(echo "$info" | python3 -c "import sys,json; print(json.load(sys.stdin).get('name','?'))")
            if [ "urn:li:person:$sub" = "$urn" ]; then
              echo "$name: URN coincide ✓ (token pertenece a: $member)"
            else
              echo "::error::$name: el URN guardado NO coincide con el dueño del token ($member). El post fallará con 403. Renovar con scripts/linkedin-token.py autorizando con la cuenta correcta."
              echo "$name: urn guardado termina en ...${urn: -6} | urn del token termina en ...${sub: -6}"
              return 1
            fi
          }
          FAIL=0
          check "Josh" "$TOKEN_JOSH" || FAIL=1
          check_urn "Josh" "$TOKEN_JOSH" "$URN_JOSH" || FAIL=1
          exit $FAIL
