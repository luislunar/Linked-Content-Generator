name: Daily publish

on:
  schedule:
    # 14:00 UTC = 10:00 AM EDT (UTC-4, Mar–Nov). Change to 15:00 UTC in November for EST.
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_POSTS_DB_ID: ${{ secrets.NOTION_POSTS_DB_ID }}
      NOTION_EXPERIMENTS_DB_ID: ${{ secrets.NOTION_EXPERIMENTS_DB_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Install deps
        run: |
          pip install requests playwright pillow openai
          npx playwright install --with-deps chromium
          npm install -g @anthropic-ai/claude-code

      - name: Generate draft (skip if already exists)
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ -f "drafts/$DATE/post.md" ]; then
            echo "Draft for $DATE already exists — skipping Claude generation."
          else
            ./scripts/run-claude.sh daily
          fi

      - name: Verify draft exists
        id: draft
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ ! -f "drafts/$DATE/post.md" ]; then
            echo "ERROR: no draft produced for $DATE" >&2
            exit 1
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "dir=drafts/$DATE" >> "$GITHUB_OUTPUT"

      - name: Generate post image
        run: |
          python scripts/generate-image-ai.py "${{ steps.draft.outputs.dir }}"

      - name: Commit draft + image to main
        run: |
          git config user.name "linked-content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add "drafts/" "logs/"
          git diff --cached --quiet || git commit -m "publish: ${{ steps.draft.outputs.date }} daily post"
          git push

      - name: Publish to LinkedIn
        run: |
          python scripts/publish-linkedin.py \
            "${{ steps.draft.outputs.dir }}/card.jpg" \
            "${{ steps.draft.outputs.dir }}"

      - name: Update Notion to published
        run: |
          DIR="${{ steps.draft.outputs.dir }}"
          POST_ID=$(python -c "import json; print(json.load(open('$DIR/post.meta.json')).get('notion_post_id',''))")
          LINKEDIN_URL=$(python -c "import json; print(json.load(open('$DIR/post.meta.json')).get('linkedin_url',''))")
          if [ -n "$POST_ID" ]; then
            python scripts/notion-sync.py update-published "$POST_ID" "$LINKEDIN_URL"
          fi
