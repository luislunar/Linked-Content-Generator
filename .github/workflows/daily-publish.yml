name: Daily publish

on:
  schedule:
    # Scheduled at 10:17 UTC (6:17 AM EDT) to compensate for GitHub Actions free-tier delays
    # of ~4h. Aims to land around 10 AM EDT. Non-zero minute reduces top-of-hour rush delay.
    - cron: "17 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Install deps
        run: |
          pip install requests playwright
          npx playwright install --with-deps chromium
          npm install -g @anthropic-ai/claude-code

      - name: Generate draft (skip if already exists)
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ -f "drafts/$DATE/post.md" ]; then
            echo "Draft for $DATE already exists — skipping Claude generation."
          else
            ./scripts/run-claude.sh daily
          fi

      - name: Verify draft exists
        id: draft
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ ! -f "drafts/$DATE/post.md" ]; then
            echo "ERROR: no draft produced for $DATE" >&2
            exit 1
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "dir=drafts/$DATE" >> "$GITHUB_OUTPUT"

      - name: Render card (template-based, no AI image)
        id: card
        run: |
          python scripts/render-card.py "${{ steps.draft.outputs.dir }}"
          DIR="${{ steps.draft.outputs.dir }}"
          if [ -f "$DIR/card.pdf" ]; then
            echo "media=$DIR/card.pdf" >> "$GITHUB_OUTPUT"
          else
            echo "media=$DIR/card.jpg" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit draft + card to main
        run: |
          git config user.name "linked-content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add "drafts/" "logs/"
          git diff --cached --quiet || git commit -m "publish: ${{ steps.draft.outputs.date }} daily post"
          git push

      - name: Publish to LinkedIn
        run: |
          python scripts/publish-linkedin.py \
            "${{ steps.card.outputs.media }}" \
            "${{ steps.draft.outputs.dir }}"
